                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            ${software.version ? `<span style="color: #888;">v${software.version}</span>` : ''}
                            ${software.installed ? `<span onclick="toggleInstalled('${software.id}')" style="background: #2ecc71; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; user-select: none; transition: all 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">✅ 已安装</span>` : `<span onclick="toggleInstalled('${software.id}')" style="background: #95a5a6; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; user-select: none; transition: all 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">⬜ 未安装</span>`}
                            ${software.category ? `<span style="background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px;">${software.category}</span>` : ''}
                        </div>
                    </div>
                    <div class="software-info">
                        <div class="info-item">
                            <div class="info-label">安装方式</div>
                            <div class="info-value ${software.installType}">${software.installType === 'online' ? '🌐 在线安装' : '💾 本地安装'}</div>
                        </div>
                        ${software.installType === 'local' ? `
                            <div class="info-item">
                                <div class="info-label">安装包文件</div>
                                <div class="info-value">${software.installPath}</div>
                            </div>
                            ${software.folderSize ? `
                            <div class="info-item">
                                <div class="info-label">文件夹大小</div>
                                <div class="info-value">${software.folderSizeFormatted} (${software.fileCount} 个文件)</div>
                            </div>
                            ` : ''}
                        ` : `
                            <div class="info-item">
                                <div class="info-label">下载链接</div>
                                <div class="info-value">${software.installPath}</div>
                            </div>
                        `}
                        <div class="info-item">
                            <div class="info-label">添加时间</div>
                            <div class="info-value">${software.createdAt}</div>
                        </div>
                    </div>
                    ${software.personalNote ? `<div class="software-note">💬 ${software.personalNote}</div>` : ''}
                    <div class="software-footer">
                        <div class="software-actions">
                            ${(software.installNotes || software.mdFilePath) ? `<button class="btn btn-info" data-id="${software.id}" onclick="showInstallNotes('${software.id}')">📋 查看说明</button>` : ''}
                            <button class="btn btn-warning" onclick="editSoftware('${software.id}')">✏️ 编辑</button>
                            ${software.installType === 'local' ? `<button class="btn btn-success" data-id="${software.id}" onclick="openPathById('${software.id}')">📂 打开位置</button>` : ''}
                            ${software.installType === 'online' ? `<button class="btn btn-success" data-id="${software.id}" onclick="openLink('${software.installPath}')">🔗 打开链接</button>` : ''}
                            <button class="btn btn-danger" onclick="deleteSoftware('${software.id}')">🗑️ 删除</button>
                        </div>
                        <div class="software-tags">
                            ${software.tags && software.tags.length > 0 ? software.tags.map(tag => `<span class="software-tag" onclick="filterByTag('${tag}')">${tag}</span>`).join('') : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            isAllSelected = false;
            const selectAllBtn = document.getElementById('selectAllBtn');
            if (selectAllBtn) {
                selectAllBtn.textContent = '☑️ 全选';
            }
            
            filteredData.forEach(async (software) => {
                if (software.installType === 'local' && software.installPath.toLowerCase().endsWith('.exe')) {
                    const iconHtml = await getSoftwareIcon(software);
                    const iconElement = document.getElementById(`icon-${software.id}`);
                    if (iconElement && iconHtml !== getFileIcon(software.installType, software.installPath)) {
                        iconElement.innerHTML = iconHtml;
                    }
                }
            });
            
            updateBatchDeleteButton();
        }

        let currentSoftwareId = null;

        let activeModalCount = 0;

        function showInstallNotes(id) {
            const software = softwareData.find(s => s.id == id);
            if (!software) return;
            
            currentSoftwareId = id;
            
            if (software.installNotes) {
                document.getElementById('modalContent').innerHTML = `
                    <strong>${software.name}</strong>
                    <p style="margin-top: 15px; white-space: pre-wrap;">${software.installNotes}</p>
                `;
                document.getElementById('installModal').classList.add('active');
                openModal();
                
                if (software.mdFilePath) {
                    document.getElementById('mdButtonContainer').style.display = 'block';
                    document.getElementById('viewMdBtn').onclick = function() {
                        closeModal();
                        showMdDocument(id);
                    };
                } else {
                    document.getElementById('mdButtonContainer').style.display = 'none';
                }
            } else if (software.mdFilePath) {
                showMdDocument(id);
            }
        }

        async function showMdDocument(id) {
            const software = softwareData.find(s => s.id == id);
            if (!software || !software.mdFilePath) return;
            
            currentSoftwareId = id;
            
            try {
                let mdContent = '';
                
                if (window.electronAPI) {
                    const result = await window.electronAPI.readFile(software.mdFilePath);
                    if (result.success) {
                        mdContent = result.content;
                    } else {
                        showToast('读取 MD 文件失败：' + result.message, true);
                        return;
                    }
                } else {
                    showToast('非 Electron 环境，无法读取文件', true);
                    return;
                }
                
                const htmlContent = marked.parse(mdContent);
                document.getElementById('mdContent').innerHTML = htmlContent;
                document.getElementById('mdModal').classList.add('active');
                openModal();
                
                if (software.installNotes) {
                    document.getElementById('viewTextBtn').onclick = function() {
                        closeMdModal();
                        showInstallNotes(id);
                    };
                    document.getElementById('viewTextBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('viewTextBtn').style.display = 'none';
                }
            } catch (error) {
                showToast('解析 MD 文件失败：' + error.message, true);
            }
        }

        function openModal() {
            activeModalCount++;
            if (activeModalCount === 1) {
                document.body.classList.add('modal-open');
            }
        }

        function closeModal() {
            document.getElementById('installModal').classList.remove('active');
            closeModalHelper();
        }

        function closeMdModal() {
            document.getElementById('mdModal').classList.remove('active');
            closeModalHelper();
        }

        async function changeMdFile() {
            try {
                if (!window.electronAPI) {
                    showToast('非 Electron 环境，无法选择文件', true);
                    return;
                }
                
                const filePath = await window.electronAPI.selectMdFile();
                if (!filePath) {
                    return;
                }
                
                const software = softwareData.find(s => s.id == currentSoftwareId);
                if (!software) {
                    showToast('软件信息不存在', true);
                    return;
                }
                
                software.mdFilePath = filePath;
                saveData();
                
                const result = await window.electronAPI.readFile(filePath);
                if (result.success) {
                    const htmlContent = marked.parse(result.content);
                    document.getElementById('mdContent').innerHTML = htmlContent;
                    showToast('MD文件更换成功！');
                } else {
                    showToast('读取 MD 文件失败：' + result.message, true);
                }
            } catch (error) {
                showToast('更换 MD 文件失败：' + error.message, true);
            }
        }

        function closeModalHelper() {
            activeModalCount--;
            if (activeModalCount <= 0) {
                activeModalCount = 0;
                document.body.classList.remove('modal-open');
            }
        }

        function openPath(path) {
            if (!path) {
                showToast('路径信息为空', true);
                return;
            }

            if (window.electronAPI) {
                window.electronAPI.openFolder(path).then(result => {
                    if (!result.success) {
                        showToast(result.message, true);
                    }
                });
            } else {
                let folderPath = path;
                const lastBackslash = path.lastIndexOf('\\');
                const lastSlash = path.lastIndexOf('/');
                const lastDot = path.lastIndexOf('.');
                
                if (lastDot > lastBackslash && lastDot > lastSlash) {
                    if (lastBackslash > 0) {
                        folderPath = path.substring(0, lastBackslash);
                    } else if (lastSlash > 0) {
                        folderPath = path.substring(0, lastSlash);
                    }
                }
                
                document.getElementById('pathMessage').textContent = '文件夹路径';
                document.getElementById('pathValue').textContent = folderPath;
                openPathModal();
                
                document.getElementById('copyPathBtn').onclick = function() {
                    navigator.clipboard.writeText(folderPath).then(() => {
                        showToast('路径已复制到剪贴板！');
                        closePathModal();
                    }).catch(() => {
                        showToast('复制失败，请手动复制', true);
                    });
                };
            }
        }

        function openPathById(id) {
            const software = softwareData.find(s => s.id == id);
            if (!software) {
                showToast('软件信息不存在', true);
                return;
            }
            
            const path = software.folderPath || software.installPath;
            openPath(path);
        }

        function openPathModal() {
            document.getElementById('pathModal').classList.add('active');
            openModal();
        }

        function closePathModal() {
            document.getElementById('pathModal').classList.remove('active');
            closeModalHelper();
        }

        function deleteSoftware(id) {
            const software = softwareData.find(s => s.id == id);
            if (!software) return;
            
            pendingDeleteId = id;
            document.getElementById('confirmMessage').textContent = `确定要删除软件"${software.name}"吗？此操作不可恢复。`;
            document.getElementById('confirmModal').classList.add('active');
            openModal();
            
            document.getElementById('confirmDeleteBtn').onclick = function() {
                softwareData = softwareData.filter(s => s.id != pendingDeleteId);
                saveData();
                updateTagFilterDropdown();
                renderSoftwareList();
                closeConfirmModal();
                showToast('软件删除成功！');
                pendingDeleteId = null;
            };
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            closeModalHelper();
            pendingDeleteId = null;
        }

        function deleteAllSoftware() {
            if (softwareData.length === 0) {
                showToast('没有软件可删除', true);
                return;
            }
            
            document.getElementById('confirmMessage').textContent = `确定要删除所有 ${softwareData.length} 个软件吗？此操作不可恢复。`;
            document.getElementById('confirmModal').classList.add('active');
            openModal();
            
            document.getElementById('confirmDeleteBtn').onclick = function() {
                softwareData = [];
                saveData();
                renderSoftwareList();
                closeConfirmModal();
                showToast('所有软件已删除！');
            };
        }

        async function calculateAllSoftwareSize() {
            if (softwareData.length === 0) {
                showToast('没有软件可计算大小', true);
                return;
            }

            showToast('开始计算软件大小...');
            
            let totalSize = 0;
            let calculatedCount = 0;
            let skippedCount = 0;
            let failedCount = 0;

            for (const software of softwareData) {
                if (software.installType !== 'local' || !software.installPath) {
                    skippedCount++;
                    continue;
                }

                if (software.folderSize) {
                    totalSize += software.folderSize;
                    calculatedCount++;
                    continue;
                }

                try {
                    if (window.electronAPI) {
                        const result = await window.electronAPI.calculateFolderSize(software.installPath);
                        if (result.success) {
                            software.folderSize = result.totalSize;
                            software.folderSizeFormatted = result.formattedSize;
                            software.fileCount = result.fileCount;
                            totalSize += result.totalSize;
                            calculatedCount++;
                        } else {
                            failedCount++;
                        }
                    }
                } catch (error) {
                    failedCount++;
                }
            }

            saveData();
            renderSoftwareList();

            let message = `计算完成！`;
            if (calculatedCount > 0) {
                message += ` 已计算 ${calculatedCount} 个软件，`;
            }
            if (skippedCount > 0) {
                message += ` 跳过 ${skippedCount} 个软件，`;
            }
            if (failedCount > 0) {
                message += ` 失败 ${failedCount} 个软件，`;
            }
            message += ` 总大小：${formatFileSize(totalSize)}`;

            showToast(message);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
        }

        async function clearAllData() {
            if (!window.electronAPI) {
                showToast('此功能仅在桌面版中可用', true);
                return;
            }
            
            document.getElementById('confirmMessage').textContent = '确定要清除所有数据吗？\n\n包括：软件数据、图标文件等\n\n注意：删除后无法恢复！';
            document.getElementById('confirmModal').classList.add('active');
            openModal();
            
            document.getElementById('confirmDeleteBtn').onclick = async function() {
                try {
                    const result = await window.electronAPI.clearAllData();
                    if (result.success) {
                        softwareData = [];
                        renderSoftwareList();
                        updateStats();
                        closeConfirmModal();
                        const deletedList = result.deletedFiles.length > 0 ? result.deletedFiles.join('、') : '无数据';
                        showToast(`数据清除成功！\n已删除：${deletedList}`);
                    } else {
                        showToast('清除失败：' + result.message, true);
                    }
                } catch (error) {
                    showToast('清除失败：' + error.message, true);
                }
            };
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.software-checkbox');
            const selectAllBtn = document.getElementById('selectAllBtn');
            
            isAllSelected = !isAllSelected;
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = isAllSelected;
            });
            
            selectAllBtn.textContent = isAllSelected ? '☐ 取消全选' : '☑️ 全选';
            
            updateBatchDeleteButton();
        }

        function updateBatchDeleteButton() {
            const checkboxes = document.querySelectorAll('.software-checkbox:checked');
            const selectedCount = checkboxes.length;
            const batchDeleteBtn = document.getElementById('batchDeleteBtn');
            const selectedCountSpan = document.getElementById('selectedCount');
            
            selectedCountSpan.textContent = selectedCount;
            
            if (selectedCount > 0) {
                batchDeleteBtn.classList.remove('hidden');
            } else {
                batchDeleteBtn.classList.add('hidden');
            }
        }

        function batchDeleteSoftware() {
            const checkboxes = document.querySelectorAll('.software-checkbox:checked');
            const selectedIds = Array.from(checkboxes).map(cb => cb.dataset.id);
            
            if (selectedIds.length === 0) {
                showToast('请先选择要删除的软件', true);
                return;
            }
            
            document.getElementById('confirmMessage').textContent = `确定要删除选中的 ${selectedIds.length} 个软件吗？此操作不可恢复。`;
            document.getElementById('confirmModal').classList.add('active');
            openModal();
            
            document.getElementById('confirmDeleteBtn').onclick = function() {
                softwareData = softwareData.filter(s => !selectedIds.includes(String(s.id)));
                saveData();
                updateTagFilterDropdown();
                renderSoftwareList();
                closeConfirmModal();
                showToast(`已删除 ${selectedIds.length} 个软件！`);
            };
        }

        function toggleInstalled(id) {
            const softwareIndex = softwareData.findIndex(s => s.id == id);
            if (softwareIndex !== -1) {
                softwareData[softwareIndex].installed = !softwareData[softwareIndex].installed;
                saveData();
                renderSoftwareList();
                showToast(softwareData[softwareIndex].installed ? '已标记为已安装！' : '已标记为未安装！');
            }
        }

        function toggleFavorite(id) {
            const softwareIndex = softwareData.findIndex(s => s.id == id);
            if (softwareIndex !== -1) {
                softwareData[softwareIndex].favorite = !softwareData[softwareIndex].favorite;
                saveData();
                renderSoftwareList();
                showToast(softwareData[softwareIndex].favorite ? '已收藏！' : '已取消收藏！');
            }
        }

        function openLink(url) {
            if (window.electronAPI) {
                window.electronAPI.openExternal(url).then(result => {
                    if (!result.success) {
                        showToast(result.message, true);
                    }
                });
            } else {
                document.getElementById('confirmMessage').textContent = `是否打开链接：${url}？`;
                document.getElementById('confirmModal').classList.add('active');
                openModal();
                
                document.getElementById('confirmDeleteBtn').onclick = function() {
                    window.open(url, '_blank');
                    closeConfirmModal();
                };
            }
        }

        async function exportData() {
            if (softwareData.length === 0) {
                showToast('没有数据可导出', true);
                return;
            }
            
            if (window.electronAPI) {
                const result = await window.electronAPI.exportData();
                if (result.canceled) {
                    return;
                }
                if (result.success && result.filePath) {
                    const writeResult = await window.electronAPI.writeFile(result.filePath, JSON.stringify(softwareData, null, 2));
                    if (writeResult.success) {
                        showToast('数据导出成功！');
                    } else {
                        showToast('导出失败：' + writeResult.message, true);
                    }
                }
            } else {
                const dataStr = JSON.stringify(softwareData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '软件管理数据_' + new Date().toLocaleDateString('zh-CN') + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }

        async function importData(event) {
            if (window.electronAPI) {
                const result = await window.electronAPI.importData();
                if (result.canceled) {
                    return;
                }
                if (result.success && result.filePath) {
                    const readResult = await window.electronAPI.readFile(result.filePath);
                    if (readResult.success) {
                        const importedData = JSON.parse(readResult.content);
                        
                        if (Array.isArray(importedData)) {
                            document.getElementById('confirmMessage').textContent = '导入将覆盖现有数据，确定要继续吗？';
                            document.getElementById('confirmModal').classList.add('active');
                            
                            document.getElementById('confirmDeleteBtn').onclick = async function() {
                                softwareData = importedData;
                                closeConfirmModal();
                                showToast('正在导入数据并恢复图标...');
                                
                                let restoredCount = 0;
                                for (let i = 0; i < softwareData.length; i++) {
                                    const software = softwareData[i];
                                    if (software.installType === 'local' && software.installPath) {
                                        const iconResult = await window.electronAPI.extractIcon(software.installPath, software.id);
                                        if (iconResult.success) {
                                            software.iconPath = iconResult.iconPath;
                                            restoredCount++;
                                        }
                                    }
                                }
                                
                                saveData();
                                updateTagFilterDropdown();
                                renderSoftwareList();
                                const message = restoredCount > 0 
                                    ? `数据导入成功！已恢复 ${restoredCount} 个图标` 
                                    : '数据导入成功！';
                                showToast(message);
                            };
                        } else {
                            showToast('无效的数据格式', true);
                        }
                    } else {
                        showToast('读取文件失败：' + readResult.message, true);
                    }
                }
            } else {
                if (event && event.target && event.target.files) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            if (Array.isArray(importedData)) {
                                document.getElementById('confirmMessage').textContent = '导入将覆盖现有数据，确定要继续吗？';
                                document.getElementById('confirmModal').classList.add('active');
                                
                                document.getElementById('confirmDeleteBtn').onclick = function() {
                                    softwareData = importedData;
                                    saveData();
                                    updateTagFilterDropdown();
                                    renderSoftwareList();
                                    closeConfirmModal();
                                    showToast('数据导入成功！');
                                };
                            } else {
                                showToast('无效的数据格式', true);
                            }
                        } catch (error) {
                            showToast('导入失败：' + error.message, true);
                        }
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                } else {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;

                        const reader = new FileReader();
                        reader.onload = function(e) {
                            try {
                                const importedData = JSON.parse(e.target.result);
                                if (Array.isArray(importedData)) {
                                    document.getElementById('confirmMessage').textContent = '导入将覆盖现有数据，确定要继续吗？';
                                    document.getElementById('confirmModal').classList.add('active');
                                    
                                    document.getElementById('confirmDeleteBtn').onclick = function() {
                                        softwareData = importedData;
                                        saveData();
                                        updateTagFilterDropdown();
                                        renderSoftwareList();
                                        closeConfirmModal();
                                        showToast('数据导入成功！');
                                    };
                                } else {
                                    showToast('无效的数据格式', true);
                                }
                            } catch (error) {
                                showToast('导入失败：' + error.message, true);
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                }
            }
        }

        document.querySelectorAll('.modal-content').forEach(content => {
            content.addEventListener('wheel', function(e) {
                e.stopPropagation();
            });
        });

        function initTagEvents() {
            const newTagInput = document.getElementById('newTagInput');
            const editNewTagInput = document.getElementById('editNewTagInput');
            const tagManagerSearch = document.getElementById('tagManagerSearch');
            const tagManagerSort = document.getElementById('tagManagerSort');
            const tagManagerConfirmBtn = document.getElementById('tagManagerConfirmBtn');

            newTagInput.addEventListener('focus', () => showTagDropdown('newTagInput', 'tagDropdown'));
            newTagInput.addEventListener('input', () => showTagDropdown('newTagInput', 'tagDropdown'));
            newTagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addNewTag();
                }
            });

            editNewTagInput.addEventListener('focus', () => showTagDropdown('editNewTagInput', 'editTagDropdown'));
            editNewTagInput.addEventListener('input', () => showTagDropdown('editNewTagInput', 'editTagDropdown'));
            editNewTagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addEditNewTag();
                }
            });

            tagManagerSearch.addEventListener('input', (e) => {
                renderTagManagerGrid(e.target.value, tagManagerSort.value);
            });

            tagManagerSort.addEventListener('change', (e) => {
                renderTagManagerGrid(tagManagerSearch.value, e.target.value);
            });

            tagManagerConfirmBtn.addEventListener('click', confirmTagManagerSelection);

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.tag-select-wrapper')) {
                    hideTagDropdown();
                }
            });
        }

        loadTagHistory().then(() => {
            initTagEvents();
        });

        loadAppData();
    </script>
